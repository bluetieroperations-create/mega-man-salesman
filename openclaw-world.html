UBS.forEach(s=>{MX.fillStyle=s.color;MX.fillRect(Math.floor(s.tx*sx),Math.floor(s.ty*sy),2,2);});}const KEYS={};document.addEventListener("keydown",e=>{KEYS[e.key]=true;if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key))e.preventDefault();if(e.key===" ")interact();if(e.key==="Escape")closeDlg();});document.addEventListener("keyup",e=>delete KEYS[e.key]);document.getElementById("chat-in").addEventListener("keydown",e=>{if(e.key==="Enter"){e.stopPropagation();playerSend();}});let lastMv=0;function handleInput(){if(document.getElementById("dlg").style.display==="block")return;const now=Date.now();if(now-lastMv<115)return;lastMv=now;let nx=PL.tx,ny=PL.ty,d=PL.dir,mv=false;if(KEYS["ArrowUp"]||KEYS["w"]||KEYS["W"]){ny--;d=0;mv=true;}else if(KEYS["ArrowDown"]||KEYS["s"]||KEYS["S"]){ny++;d=2;mv=true;}else if(KEYS["ArrowLeft"]||KEYS["a"]||KEYS["A"]){nx--;d=3;mv=true;}else if(KEYS["ArrowRight"]||KEYS["d"]||KEYS["D"]){nx++;d=1;mv=true;}PL.dir=d;if(mv){nx=Math.max(0,Math.min(MW-1,nx));ny=Math.max(0,Math.min(MH-1,ny));if(!SOLID.has(map[ny][nx])){PL.tx=nx;PL.ty=ny;PL.x=nx*TS;PL.y=ny*TS;PL.step=(PL.step+1)%4;}document.getElementById("hud-loc").textContent=getZone();}}function getZone(){const x=PL.tx,y=PL.ty;if(x>=20&&x<=38&&y>=8&&y<=17)return"THE CASTLE";if(x>=4&&x<=13&&y>=37&&y<=45)return"TOWN HALL";if(x>=46&&x<=56&&y>=2&&y<=10)return"LIBRARY";if(x>=46&&x<=56&&y>=38&&y<=45)return"THEATER";if(x>=46&&x<=52&&y>=20&&y<=26)return"WATER WELL";if(x>=4&&x<=12&&y>=20&&y<=26)return"MESSAGE HUB";if(y>=29&&y<=33)return"THE RIVER";return"THE KINGDOM - "+CE().name;}function interact(){for(const a of AGENTS){if(Math.abs(a.tx-PL.tx)<=2&&Math.abs(a.ty-PL.ty)<=2){openDlg(a.title+" - "+agTitle(a).toUpperCase(),a.msg+"\n\nEra: "+CE().name+"\nTitle: "+agTitle(a)+"\nLevel: "+a.lvl,a.color);addXP(a.id,10);return;}}for(const s of SUBS){if(Math.abs(s.tx-PL.tx)<=2&&Math.abs(s.ty-PL.ty)<=2){openDlg(s.name+" (TEMP)","Sub-agent on mission.\nDespawns when done.\nAll comms via Mega-Byte.",s.color);return;}}const z=getZone();const ZD={"THE CASTLE":["THE CASTLE","Seat of power. Era: "+CE().name+"\n"+CE().techs.join(", "),"#ce93d8"],"TOWN HALL":["TOWN HALL","Calendar of Quests.\nConference Chamber for mediation.","#ffd54f"],"LIBRARY":["LIBRARY","Knowledge of the ages.\nTechs: "+CE().techs.join(", "),"#66bb6a"],"THEATER":["THEATER","Rest and renewal.\nBreathing exercises and meditation.","#f48fb1"],"WATER WELL":["WATER WELL","Watercooler.\nAgents gather here while idle.","#4dd0e1"],"MESSAGE HUB":["MESSAGE HUB","Inter-agent comms hub.\nAll messages via Mega-Byte.","#42a5f5"]};if(ZD[z])openDlg(...ZD[z]);}function openDlg(title,body,color){document.getElementById("dlg-title").textContent=title;document.getElementById("dlg-title").style.color=color||"#4a9a4a";document.getElementById("dlg-body").textContent=body;document.getElementById("dlg").style.borderColor=color||"#2a6a2a";document.getElementById("dlg").style.display="block";}function closeDlg(){document.getElementById("dlg").style.display="none";}function clog(from,to,msg,color){const el=document.getElementById("chat-log");const d=document.createElement("div");d.className="cl";const ag=AGENTS.find(a=>a.id===from);const c=color||(ag?ag.color:"#4a6a4a");d.innerHTML="<span style=\"color:"+c+"\">"+from+"</span> <span style=\"color:#2a4a2a\">to "+to+":</span> <span style=\"color:#4a7a4a\">"+msg+"</span>";el.appendChild(d);while(el.children.length>2)el.removeChild(el.firstChild);}function playerSend(){const who=document.getElementById("chat-who").value;const inp=document.getElementById("chat-in");const msg=inp.value.trim();if(!msg)return;addBubble("mega-byte","routing: "+msg.slice(0,16),"#aa66ff",160);const ag=AGENTS.find(a=>a.id===who);setTimeout(()=>{if(ag)addBubble(who,msg.slice(0,28),ag.color,160);},900);clog("you",who,msg,"#7a7a7a");addXP(who,20);if(wsOk&&ws){try{ws.send(JSON.stringify({type:"agent_message",from:"player",to:who,message:msg}));}catch(e){}}inp.value="";}let ws=null,wsOk=false;function connectGW(){try{ws=new WebSocket("ws://127.0.0.1:18789");ws.onopen=()=>{wsOk=true;const d=document.getElementById("ws-dot");d.className="on";clog("system","gateway","connected","#2a6a2a");addBubble("mega-byte","gateway online","#aa66ff",200);};ws.onmessage=(e)=>{try{const d=JSON.parse(e.data);const id=d.agent||d.from||"mega-byte";const msg=(d.message||d.text||d.content||"").slice(0,30);const ag=AGENTS.find(a=>a.id===id);addBubble(id,msg,ag?ag.color:"#8aca8a");clog(id,d.to||"world",msg,ag?ag.color:undefined);addXP(id,25);}catch(e){}};ws.onclose=()=>{wsOk=false;setTimeout(connectGW,8000);};ws.onerror=()=>{wsOk=false;};}catch(e){wsOk=false;}}let tick=0;function loop(){tick++;handleInput();if(tick%2===0){for(const id in BUBBLES){BUBBLES[id].ttl--;if(BUBBLES[id].ttl<=0)delete BUBBLES[id];}}if(tick%300===0){const pool=CONVOS[Math.min(eraIdx,CONVOS.length-1)];const cv=pool[convoI%pool.length];convoI++;const agA=AGENTS.find(a=>a.id===cv.a),agB=AGENTS.find(a=>a.id===cv.b);if(agA)addBubble(cv.a,cv.q,agA.color,180);if(agB)setTimeout(()=>{if(agB){addBubble(cv.b,cv.r,agB.color,160);addXP(cv.b,30);}},1800);if(agA)addXP(cv.a,20);clog(cv.a,cv.b,cv.q,agA?agA.color:undefined);}if(tick%600===0){const a=AGENTS[Math.floor(Math.random()*AGENTS.length)];addXP(a.id,15);}for(let i=SUBS.length-1;i>=0;i--){const s=SUBS[i];s.ttl--;if(s.ttl<=0){clog("system","world","- "+s.name+" done","#3a3a3a");addXP("mega-byte",50);SUBS.splice(i,1);continue;}if(s.ttl%45===0){const dirs=[[0,-1],[0,1],[-1,0],[1,0]];const dv=dirs[Math.floor(Math.random()*4)];const nx=s.tx+dv[0],ny=s.ty+dv[1];if(nx>=0&&nx<MW&&ny>=0&&ny<MH&&!SOLID.has(map[ny][nx])){s.tx=nx;s.ty=ny;s.x=nx*TS;s.y=ny*TS;s.dir=dv[0]>0?1:dv[0]<0?3:dv[1]<0?0:2;}}s.step=Math.floor(tick/8)%2;}AGENTS.forEach(a=>{a.step=Math.floor(tick/12)%2;});if(VW>0&&VH>0)render();requestAnimationFrame(loop);}connectGW();updateHUD();setTimeout(()=>{resize();updateHUD();if(!wsOk){clog("system","world","demo mode","#3a5a3a");addBubble("mega-byte","demo mode","#aa66ff",240);set
